version: "3.9"

services:
 sqlserver:
  image: mcr.microsoft.com/mssql/server:2022-latest
  container_name: sqlserver2022
  restart: always
  environment:
   ACCEPT_EULA: "Y"
   MSSQL_SA_PASSWORD: "admin123@"
   MSSQL_PID: "Express"
  ports:
  - "1433:1433"
  volumes:
  - sqlserver_data:/var/opt/mssql
volumes:
    sqlserver_data:
